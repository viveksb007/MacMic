name: MacMic
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  MacMic:
    type: application
    platform: macOS
    sources:
      - MacMic
    settings:
      base:
        INFOPLIST_FILE: MacMic/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacMic/MacMic.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.macmic.MacMic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
