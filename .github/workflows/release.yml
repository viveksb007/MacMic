name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project MacMic.xcodeproj \
            -scheme MacMic \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build

      - name: Create Archive
        run: |
          cd build/Build/Products/Release
          zip -r MacMic.zip MacMic.app
          mv MacMic.zip $GITHUB_WORKSPACE/

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 MacMic.zip | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MacMic.zip
          body: |
            ## Installation

            ### Via Homebrew
            ```bash
            brew tap viveksb007/tap
            brew install --cask macmic
            ```

            ### Manual Installation
            1. Download `MacMic.zip`
            2. Extract and move `MacMic.app` to `/Applications`

            **SHA256:** `${{ steps.sha256.outputs.sha256 }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA256=${{ steps.sha256.outputs.sha256 }}

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/viveksb007/homebrew-tap.git
          cd homebrew-tap

          mkdir -p Casks

          cat > Casks/macmic.rb << CASK
          cask "macmic" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/viveksb007/MacMic/releases/download/v${VERSION}/MacMic.zip"
            name "MacMic"
            desc "macOS menu bar app that streams audio from any microphone to any speaker"
            homepage "https://github.com/viveksb007/MacMic"

            app "MacMic.app"

            zap trash: [
              "~/Library/Preferences/com.macmic.MacMic.plist",
            ]
          end
          CASK

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Casks/macmic.rb
          git commit -m "Update macmic cask to v${VERSION}"
          git push
